[variables]
HF_HOME = "/opt/huggingface"

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "pip install -r requirements-backend.txt"
]

[phases.build]
cmds = [
  "python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('intfloat/multilingual-e5-base')\""
]
